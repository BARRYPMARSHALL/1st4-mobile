    pool_id: "POOL-A7X"
    total_included_gb: 500
    participating_plans: ["MBP-50GB-POOL", "MBP-200GB-POOL"]
    overage_billing: "shared"
    overage_rate: 0.0015

roaming_zones:
  - zone: "Zone 1 (NZ, US, UK, Canada)"
    data_rate: 0.00
    voice_rate: 0.50
    sms_rate: 0.00

  - zone: "Zone 2 (Asia)"
    data_rate: 0.01
    voice_rate: 1.00
    sms_rate: 0.50

  - zone: "Zone 3 (Rest of World)"
    data_rate: 0.02
